name: ETL Semanal Reviews
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pandas
      - run: python backend/nlp/dataset_generator.py
      - run: python backend/nlp/modelo.py