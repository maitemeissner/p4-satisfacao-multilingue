name: ETL Semanal - Preditor de Satisfação

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Gerar dataset e treinar modelo
        run: |
          cd backend/nlp
          python dataset_generator.py
          python treino.py

      - name: Conectar ao Neon PostgreSQL (mock)
        run: |
          echo "ETL concluído - dados prontos para ingestão no Neon PostgreSQL"
          echo "Host: ${{ secrets.NEON_HOST }}"
          echo "Database: ${{ secrets.NEON_DATABASE }}"

      - name: Notificar conclusão
        run: echo "ETL Semanal executado com sucesso em $(date)"
