services:
  - type: web
    name: p4-satisfacao-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: PORT
        value: "8000"
      - key: FLASK_ENV
        value: production
      - key: NEON_HOST
        sync: false
      - key: NEON_DATABASE
        value: neondb
      - key: NEON_USER
        sync: false
      - key: NEON_PASSWORD
        sync: false
    disk:
      name: data
      mountPath: /data
      sizeGB: 1

  - type: web
    name: p4-satisfacao-frontend
    env: static
    buildCommand: cd frontend && npm install && VITE_API_URL=https://p4-satisfacao-backend.onrender.com npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://p4-satisfacao-backend.onrender.com

  - type: web
    name: p4-mcp-server
    env: node
    buildCommand: cd mcp-server && npm install && npm run build
    startCommand: cd mcp-server && node dist/index.js
    envVars:
      - key: FLASK_URL
        value: https://p4-satisfacao-backend.onrender.com
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
